# ─── tmux.conf ───────────────────────────────────────────────────────────────
# Prefix stays as Ctrl-b so Ghostty's super+shift+arrow → \x02 + hjkl works.

# ─── Core ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*:Tc"
set -g focus-events on
set -g mouse on
set -g history-limit 100000
set -g escape-time 0          # zero-latency esc for nvim
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-clipboard on

# Vim-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ─── Splits (intuitive, keep cwd) ────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation: prefix + hjkl (Cmd+Shift+Arrow from Ghostty maps here) ─
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also accept prefix + arrows
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Pane resize (prefix + Shift+hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switching: prefix + n/p plus Shift+Arrow inside prefix mode
bind -r n next-window
bind -r p previous-window

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Quick pane sync toggle (broadcast to all panes — useful for multi-claude)
bind S setw synchronize-panes \; display "sync-panes: #{?pane_synchronized,ON,OFF}"

# ─── Flexoki Dark colours ────────────────────────────────────────────────────
# Palette
%hidden FLX_BG="#100F0F"
%hidden FLX_BG2="#1C1B1A"
%hidden FLX_UI="#282726"
%hidden FLX_UI2="#343331"
%hidden FLX_TX3="#575653"
%hidden FLX_TX2="#878580"
%hidden FLX_TX="#CECDC3"
%hidden FLX_RED="#D14D41"
%hidden FLX_ORANGE="#DA702C"
%hidden FLX_YELLOW="#D0A215"
%hidden FLX_GREEN="#879A39"
%hidden FLX_CYAN="#3AA99F"
%hidden FLX_BLUE="#4385BE"
%hidden FLX_PURPLE="#8B7EC8"
%hidden FLX_MAGENTA="#CE5D97"

# Pane borders
set -g pane-border-style "fg=$FLX_UI2"
set -g pane-active-border-style "fg=$FLX_BLUE"
set -g pane-border-lines single

# Message / command line
set -g message-style "bg=$FLX_BG2,fg=$FLX_TX"
set -g message-command-style "bg=$FLX_BG2,fg=$FLX_YELLOW"

# Copy-mode selection
set -g mode-style "bg=$FLX_BLUE,fg=$FLX_BG"

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=$FLX_BG2,fg=$FLX_TX2"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=$FLX_BLUE,fg=$FLX_BG,bold]  #S #[bg=$FLX_BG2,fg=$FLX_BLUE]"

# Right: git branch/status + cwd + clock
set -g status-right-length 200
set -g status-right "#[fg=$FLX_UI2]#[bg=$FLX_UI2,fg=$FLX_TX] #(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null | head -c40)#(cd '#{pane_current_path}' && git status --porcelain 2>/dev/null | awk 'BEGIN{m=0;u=0;s=0} /^[ MARC?]M/{m++} /^\\?\\?/{u++} /^[MARCD]/{s++} END{out=\"\"; if(s)out=out\" #[fg=#879A39]●\"s; if(m)out=out\" #[fg=#D0A215]●\"m; if(u)out=out\" #[fg=#D14D41]●\"u; print out}') #[bg=$FLX_BG2,fg=$FLX_UI2]#[bg=$FLX_BG2,fg=$FLX_TX3]  #(basename '#{pane_current_path}') #[fg=$FLX_TX3]│#[fg=$FLX_TX2] %H:%M "

# Window list (tabs)
set -g window-status-separator ""
set -g window-status-format "#[bg=$FLX_BG2,fg=$FLX_TX3]  #I  #W  "
set -g window-status-current-format "#[bg=$FLX_BG2,fg=$FLX_BG]#[bg=$FLX_GREEN,fg=$FLX_BG,bold] #I  #W #[bg=$FLX_BG2,fg=$FLX_GREEN]"
set -g window-status-activity-style "fg=$FLX_YELLOW"
set -g window-status-bell-style "fg=$FLX_RED,bold"
setw -g monitor-activity on
set -g visual-activity off

# ─── Plugins (tpm) ──────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-h/j/k/l also works between vim<->tmux

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
